# EXP-001B-ALGO: H1 on algo_exec (v3), the loop-favored serial-computation family,
# validated in gate 8 (+0.115 depth separation, agent/log/EXP-000C.md).
# Same pre-registered margin as EXP-001: loop4 - loop1 >= +3.0 pts family mean,
# 3 seeds, diff > 2x pooled seed SD.
exp_id: EXP-001B-ALGO

train:
  families: [algo_exec]
  steps: 6000
  batch_size: 32
  seq_len: 768
  lr: 4.0e-4
  warmup: 300
  eval_limit: 300
seeds: [0, 1, 2]

models:
  - id: V1-loop1
    arch: loop
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_prelude: 1
    n_core: 2
    n_coda: 1
    loop_count: 1
    bptt_loops: 1
    max_seq_len: 1024

  - id: V1-loop4
    arch: loop
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_prelude: 1
    n_core: 2
    n_coda: 1
    loop_count: 4
    bptt_loops: 2
    max_seq_len: 1024
