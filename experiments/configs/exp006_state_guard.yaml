# EXP-006-SG: B2-SWA arm on state_guard (second memory family; per-family
# training). Compared against existing EXP-002-SG runs.
exp_id: EXP-006-SG

train:
  families: [state_guard]
  steps: 4000
  lr: 4.9e-4
seeds: [0, 1, 2]

models:
  - id: B2-SWA
    arch: tf_pp
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    window: 128
    max_seq_len: 1024
