# EXP-008-SG: 50M scale check, state_guard (memory family; compress excluded —
# 15.7GB/job at 18M projects past 32GB at 50M).
exp_id: EXP-008-SG

train:
  families: [state_guard]
  steps: 4000
  lr: 4.2e-4
seeds: [0, 1]

models:
  - id: V3-50M
    arch: delta
    d_model: 768
    n_heads: 12
    n_kv_heads: 4
    d_ff: 2048
    n_layers: 8
    delta_every: 2
    window: 128
    d_k: 504
    d_v: 504
    max_seq_len: 1024

  - id: B2-50M
    arch: tf_pp
    d_model: 768
    n_heads: 12
    n_kv_heads: 4
    d_ff: 2048
    n_layers: 8
    max_seq_len: 1024
