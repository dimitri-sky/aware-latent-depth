# EXP-002-DL: H2 family extension on dsl_learn (5th family) + demo checkpoints.
# Same protocol as the rest of the EXP-002 suite. 2 seeds (time-boxed inside
# the EXP-008 session; noted as partial coverage in the claim table).
exp_id: EXP-002-DL

train:
  families: [dsl_learn]
  steps: 4000
  lr: 4.9e-4
seeds: [0, 1]

models:
  - id: V2-delta
    arch: delta
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    delta_every: 2
    window: 128
    d_k: 384
    d_v: 384
    max_seq_len: 1024

  - id: B2-6L
    arch: tf_pp
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    max_seq_len: 1024
