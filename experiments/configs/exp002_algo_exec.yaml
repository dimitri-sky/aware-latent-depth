# EXP-002-AX: H2 dissociation arm — V2 vs B2 trained on algo_exec (a NON-memory
# family). Pre-reg: gain on rule_shift must exceed gain on algo_exec, else the
# memory advantage is generic capacity. Same protocol as the other EXP-002 configs.
exp_id: EXP-002-AX

train:
  families: [algo_exec]
  steps: 4000
  lr: 4.9e-4
seeds: [0, 1, 2]

models:
  - id: V2-delta
    arch: delta
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    delta_every: 2
    window: 128
    d_k: 384
    d_v: 384
    max_seq_len: 1024

  - id: B2-6L
    arch: tf_pp
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    max_seq_len: 1024
