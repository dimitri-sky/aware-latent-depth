# EXP-002-RS: H2 falsifier on rule_shift (per-family training per the multi-task
# dilution lesson). V2 gated-delta hybrid vs param-matched B2 (17.86M vs 17.83M,
# 0.1%). Protocol mirrors the validated gate: 4000 steps, depth-scaled lr for 6L
# (min(6e-4, 6e-4*sqrt(4/6)) = 4.9e-4), 3 seeds, median aggregation at analysis.
exp_id: EXP-002-RS

train:
  families: [rule_shift]
  steps: 4000
  lr: 4.9e-4
seeds: [0, 1, 2]

models:
  - id: V2-delta
    arch: delta
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    delta_every: 2
    window: 128
    d_k: 384
    d_v: 384
    max_seq_len: 1024

  - id: B2-6L
    arch: tf_pp
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    max_seq_len: 1024
