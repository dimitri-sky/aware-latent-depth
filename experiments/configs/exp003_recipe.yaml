# EXP-003: H3 — loops with the 2026 recipe (per-loop deep supervision + randomized
# loop counts + TBPTT + input injection) vs equal-params loop1 reference.
# The matched-training-FLOP control is exp003_control.yaml (SAME BATCH, per the
# EXP-001B lesson). Pre-registration: agent/log/EXP-003.md.
exp_id: EXP-003

train:
  families: [rewrite, algo_exec]
  steps: 6000
  lr: 4.0e-4
seeds: [0, 1, 2]

models:
  # The hypothesis: recipe loops
  - id: V1R-loop4
    arch: loop
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_prelude: 1
    n_core: 2
    n_coda: 1
    loop_count: 4
    bptt_loops: 2
    deep_supervision: true
    loop_randomize: true
    max_seq_len: 1024

  # Equal-params reference (completes the accounting matrix)
  - id: V1-loop1
    arch: loop
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_prelude: 1
    n_core: 2
    n_coda: 1
    loop_count: 1
    bptt_loops: 1
    max_seq_len: 1024
