# EXP-006-CP: B2-SWA arm on compress (cleanest H2 family; per-family training
# per the multi-task dilution lesson). Does the window prior alone reproduce
# V2's +8.0 compress gain? Compared against existing EXP-002-CP runs.
exp_id: EXP-006-CP

train:
  families: [compress]
  steps: 4000
  lr: 4.9e-4
seeds: [0, 1, 2]

models:
  - id: B2-SWA
    arch: tf_pp
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    window: 128
    max_seq_len: 1024
