# EXP-004-AX: thinking-token economics on algo_exec (computation family).
# New arms only — B2 direct and V3 direct are REUSED from EXP-002-AX (declared in
# agent/log/EXP-004.md). CoT budget knob = trace granularity at TRAINING time
# (extra.trace_level, which also keeps every arm's config_hash distinct); eval runs
# in CoT mode with a per-arm decode budget; every generated token is charged a full
# forward pass. B2-wide sized by scripts/exp004_flopmatch.py to match B2-CoT-long's
# FLOPs/answer on tiers 3-5 within +-10% (locked: 1.48e10 vs 1.45e10, err 1.8%).
# B2-filler-long: contentless tokens length-matched to the long trace (content-vs-
# compute control), 2 seeds. V3-CoT-long: optional stacking arm, time-gated.
# Protocol: 4000 steps x 32 x 768, lr 4.9e-4 (B2-wide lr set by pre-eval probe).
exp_id: EXP-004-AX

train:
  families: [algo_exec]
  steps: 4000
  lr: 4.9e-4
seeds: [0, 1, 2]

models:
  - id: B2-CoT-short
    arch: tf_pp
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    max_seq_len: 1024
    extra: {trace_level: short}

  - id: B2-CoT-med
    arch: tf_pp
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    max_seq_len: 1024
    extra: {trace_level: med}

  - id: B2-CoT-long
    arch: tf_pp
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    max_seq_len: 1024
    extra: {trace_level: long}

  - id: B2-filler-long
    arch: tf_pp
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    max_seq_len: 1024
    extra: {trace_level: filler}

  - id: B2-wide
    arch: tf_pp
    d_model: 672
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1856
    n_layers: 6
    max_seq_len: 1024

  - id: V3-CoT-long
    arch: delta
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    delta_every: 2
    window: 128
    d_k: 384
    d_v: 384
    max_seq_len: 1024
    extra: {trace_level: long}
