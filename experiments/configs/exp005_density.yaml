# EXP-005-DEN: V3 delta-density sweep on algo_exec at the standard protocol.
# d1 (delta every layer) and d3 (every 3rd) vs the existing d2 (V2-delta,
# EXP-002-AX) and B2 cells. All densities param-matched within 0.3% at d_k=384.
# 2 seeds (tuning decision, not a claim gate; tie-break on flops/correct).
exp_id: EXP-005-DEN

train:
  families: [algo_exec]
  steps: 4000
  lr: 4.9e-4
seeds: [0, 1]

models:
  - id: V3-d1
    arch: delta
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    delta_every: 1
    window: 128
    d_k: 384
    d_v: 384
    max_seq_len: 1024

  - id: V3-d3
    arch: delta
    d_model: 512
    n_heads: 8
    n_kv_heads: 4
    d_ff: 1408
    n_layers: 6
    delta_every: 3
    window: 128
    d_k: 384
    d_v: 384
    max_seq_len: 1024
